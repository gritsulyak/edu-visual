          "Отрисовка доски в консоли",
          "Работа с внешней БД",
          "Приём структур от сервисного слоя и сохранение их в соответствующие слайсы",
          "Организация многопоточности и планировщика"
        ],
        answer: 2
      },
      {
        category: "Интерфейсы / репозиторий",
        question: "Зачем требовалось, чтобы разные структуры (например, ход, игра, игрок) реализовывали общий интерфейс для передачи в репозиторий?",
        options: [
          "Чтобы уменьшить количество файлов в проекте",
          "Чтобы можно было хранить любые структуры в одном слайсе без проверки типа",
          "Чтобы репозиторий мог принимать значения одного интерфейсного типа и распределять их по конкретным слайсам через type assertion",
          "Чтобы ускорить выполнение программы"
        ],
        answer: 2
      },
      {
        category: "Интерфейсы / type assertion",
        question: "Как в Go проверить реальный тип значения интерфейса value и выполнить логику в зависимости от типа?",
        options: [
          "Использовать оператор as в стиле других языков",
          "Использовать конструкцию switch v := value.(type) { ... }",
          "Использовать reflect.TypeOf внутри if-else",
          "Это невозможно"
        ],
        answer: 1
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    let timeLeft = 60;         // секунд на вопрос
    let timerId = null;

    const questionTextEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const scoreEl = document.getElementById("score");
    const counterEl = document.getElementById("question-counter");
    const categoryEl = document.getElementById("category");
    const nextBtn = document.getElementById("next-btn");
    const restartBtn = document.getElementById("restart-btn");
    const showAnswerBtn = document.getElementById("show-answer-btn");
    const finalResultEl = document.getElementById("final-result");
    const progressFillEl = document.getElementById("progress-fill");
    const timerEl = document.getElementById("timer");

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function stopTimer() {
      if (timerId !== null) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function startTimerForQuestion() {
      stopTimer();
      timeLeft = 60;
      timerEl.textContent = "Время: " + timeLeft + " c";
      timerId = setInterval(() => {
        timeLeft--;
        timerEl.textContent = "Время: " + timeLeft + " c";
        if (timeLeft <= 0) {
          stopTimer();
          if (!answered) {
            feedbackEl.textContent = "Время вышло. Переходим к следующему вопросу.";
            feedbackEl.className = "incorrect-text";
            answered = true;
            nextBtn.disabled = false;
          }
        }
      }, 1000);
    }

    function startQuiz() {
      score = 0;
      currentIndex = 0;
      answered = false;
      shuffleArray(questions);
      for (const q of questions) {
        const paired = q.options.map((opt, idx) => ({ opt, idx }));
        shuffleArray(paired);
        q.shuffledOptions = paired.map(p => p.opt);
        q.correctIndexShuffled = paired.findIndex(p => p.idx === q.answer);
      }
      finalResultEl.style.display = "none";
      scoreEl.textContent = "Счёт: 0 / " + questions.length;
      loadQuestion();
    }

    function updateProgress() {
      const progress = (currentIndex / questions.length) * 100;
      progressFillEl.style.width = progress + "%";
    }

    function loadQuestion() {
      if (currentIndex >= questions.length) {
        stopTimer();
        showFinalResult();
        return;
      }
      updateProgress();
      answered = false;
      nextBtn.disabled = true;
      feedbackEl.textContent = "";
      feedbackEl.className = "";
      optionsEl.innerHTML = "";
      const q = questions[currentIndex];
      counterEl.textContent = "Вопрос " + (currentIndex + 1) + " из " + questions.length;
      categoryEl.textContent = q.category;
      questionTextEl.textContent = q.question;
      q.shuffledOptions.forEach((opt, idx) => {
        const div = document.createElement("div");
        div.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = idx;
        const label = document.createElement("span");
        label.textContent = opt;
        div.appendChild(input);
        div.appendChild(label);
        div.addEventListener("click", () => selectOption(idx, div));
        optionsEl.appendChild(div);
      });
      startTimerForQuestion();
    }

    function selectOption(idx, divEl) {
      if (answered) return;
      answered = true;
      stopTimer();
      const q = questions[currentIndex];
      const optionsDivs = document.querySelectorAll(".option");
      optionsDivs.forEach(d => {
        const input = d.querySelector("input");
        input.checked = false;
        d.classList.remove("correct", "incorrect");
      });
      const input = divEl.querySelector("input");
      input.checked = true;

      if (idx === q.correctIndexShuffled) {
        divEl.classList.add("correct");
        feedbackEl.textContent = "Верно!";
        feedbackEl.className = "correct-text";
        score++;
      } else {
        divEl.classList.add("incorrect");
        feedbackEl.textContent = "Неверно. Можешь посмотреть правильный ответ.";
        feedbackEl.className = "incorrect-text";
      }
      scoreEl.textContent = "Счёт: " + score + " / " + questions.length;
      nextBtn.disabled = false;
    }

    function showCorrectAnswer() {
      const q = questions[currentIndex];
      const optionsDivs = document.querySelectorAll(".option");
      optionsDivs.forEach((d, idx) => {
        d.classList.remove("correct");
        if (idx === q.correctIndexShuffled) {
          d.classList.add("correct");
        }
      });
    }

    function nextQuestion() {
      currentIndex++;
      loadQuestion();
    }

    function showFinalResult() {
      finalResultEl.style.display = "block";
      const percent = Math.round((score / questions.length) * 100);
      finalResultEl.innerHTML =
        "<strong>Квиз завершён.</strong><br>" +
        "Правильных ответов: " + score + " из " + questions.length +
        " (" + percent + "%)." +
        "<br>Можешь нажать «Начать заново», чтобы пройти ещё раз — вопросы будут перемешаны.";
    }

    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", () => {
      stopTimer();
      startQuiz();
    });
    showAnswerBtn.addEventListener("click", showCorrectAnswer);

    startQuiz();
  </script>
</body>
</html>
